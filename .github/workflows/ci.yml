name: CI

on:
  push:
    branches: [develop, master]
  pull_request:
    branches: [develop, master]

jobs:
  build:
    name: Syntax check & Docker build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Check source syntax
        run: |
          for f in src/*.js; do
            node --check "$f" && echo "✓ $f" || exit 1
          done

      - name: Build Docker image (amd64 — verificação rápida)
        run: docker build -t whatsapp-service:ci .
