name: Deploy — EC2

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  id-token: write   # OIDC
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPO:   whatsapp-service

jobs:
  deploy:
    name: Build ARM64, push ECR & deploy via SSM
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      # ── AWS auth via OIDC (sem chaves estáticas) ──────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── Build ARM64 (Graviton — menor custo) ──────────────────────
      - name: Set up QEMU (cross-compile para ARM64)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build e push imagem ARM64
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO }}:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Deploy via SSM (sem SSH exposto) ──────────────────────────
      - name: Deploy no EC2 via SSM
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters commands="[
              \"aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin $REGISTRY\",
              \"docker pull $REGISTRY/${{ env.ECR_REPO }}:latest\",
              \"docker stop whatsapp-service 2>/dev/null || true\",
              \"docker rm   whatsapp-service 2>/dev/null || true\",
              \"docker run -d --name whatsapp-service --restart unless-stopped -p 3001:3001 -v /opt/whatsapp-sessions:/app/sessions \$(aws ssm get-parameters-by-path --path /whatsapp-service --with-decryption --query 'Parameters[*].[Name,Value]' --output text | awk '{sub(/\\/whatsapp-service\\//, \"\", \$1); printf \\\"-e %s=%s \\\", \$1, \$2}') $REGISTRY/${{ env.ECR_REPO }}:latest\",
              \"docker image prune -f\"
            ]" \
            --timeout-seconds 180 \
            --query Command.CommandId \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          # Aguarda conclusão
          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query Status --output text 2>/dev/null || echo "Pending")
            echo "[$i] Status: $STATUS"
            if [ "$STATUS" = "Success" ]; then
              echo "Deploy concluído com sucesso"
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ]; then
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                --query StandardErrorContent --output text
              exit 1
            fi
            sleep 10
          done
          echo "Timeout aguardando SSM"
          exit 1
