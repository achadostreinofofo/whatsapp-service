name: Deploy — EC2

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPO:   whatsapp-service

jobs:
  deploy:
    name: Build ARM64, push ECR & deploy via SSM
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up QEMU (cross-compile para ARM64)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build e push imagem ARM64
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO }}:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy no EC2 via SSM
        env:
          REGISTRY:            ${{ steps.login-ecr.outputs.registry }}
          INSTANCE_ID:         ${{ secrets.EC2_INSTANCE_ID }}
          API_SECRET:          ${{ secrets.API_SECRET }}
          BACKEND_WEBHOOK_URL: ${{ secrets.BACKEND_WEBHOOK_URL }}
          BACKEND_API_SECRET:  ${{ secrets.BACKEND_API_SECRET }}
        run: |
          python3 - <<'PYEOF'
          import json, os, subprocess, sys, time

          registry           = os.environ['REGISTRY']
          instance_id        = os.environ['INSTANCE_ID']
          region             = os.environ['AWS_REGION']
          repo               = os.environ['ECR_REPO']
          api_secret         = os.environ['API_SECRET']
          backend_url        = os.environ['BACKEND_WEBHOOK_URL']
          backend_secret     = os.environ['BACKEND_API_SECRET']

          commands = [
              f"aws ecr get-login-password --region {region} | docker login --username AWS --password-stdin {registry}",
              f"docker pull {registry}/{repo}:latest",
              "docker stop whatsapp-service 2>/dev/null || true",
              "docker rm   whatsapp-service 2>/dev/null || true",
              (
                  f"docker run -d --name whatsapp-service --restart unless-stopped "
                  f"-p 3001:3001 -v /opt/whatsapp-sessions:/app/sessions "
                  f"-e PORT=3001 "
                  f"-e API_SECRET={api_secret} "
                  f"-e SESSIONS_DIR=/app/sessions "
                  f"-e LOG_LEVEL=info "
                  f"-e BACKEND_WEBHOOK_URL={backend_url} "
                  f"-e BACKEND_API_SECRET={backend_secret} "
                  f"{registry}/{repo}:latest"
              ),
              "docker image prune -f",
          ]

          payload = {
              "InstanceIds":  [instance_id],
              "DocumentName": "AWS-RunShellScript",
              "Parameters":   {"commands": commands},
              "TimeoutSeconds": 180,
          }

          with open('/tmp/ssm-payload.json', 'w') as f:
              json.dump(payload, f)
          PYEOF

          COMMAND_ID=$(aws ssm send-command \
            --cli-input-json file:///tmp/ssm-payload.json \
            --query Command.CommandId \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query Status --output text 2>/dev/null || echo "Pending")
            echo "[$i] Status: $STATUS"
            if [ "$STATUS" = "Success" ]; then
              echo "Deploy concluído com sucesso"
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ]; then
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query StandardErrorContent --output text
              exit 1
            fi
            sleep 10
          done
          echo "Timeout aguardando SSM"
          exit 1
